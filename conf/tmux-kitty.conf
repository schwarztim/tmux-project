# tmux-project — Kitty terminal overrides
# Source this AFTER the base tmux.conf if you use kitty:
#   source-file /path/to/tmux-project/conf/tmux-kitty.conf

# True color support for kitty
set -ga terminal-overrides ',xterm-kitty:Tc'

# Kitty shows session name in tab title — hide it from tmux status-left
set -g status-left-length 0
set -g status-left ''
