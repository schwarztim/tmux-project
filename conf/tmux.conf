# tmux-project — Base tmux configuration
# Source this from your ~/.tmux.conf:
#   source-file /path/to/tmux-project/conf/tmux.conf
#
# Or copy/merge into your existing config.

# ============================================================================
# STATUS BAR
# ============================================================================

set -g status on
set -g status-position bottom
set -g status-interval 5
set -g status-style 'default'

# Left: session name
set -g status-left-length 30
set -g status-left ' #S  '
set -g status-justify left

# Window tabs
set -g window-status-separator '#[default,dim] | '
set -g window-status-current-style 'default,bold'
set -g window-status-current-format ' #W '
set -g window-status-style 'default,dim'
set -g window-status-format ' #W '

# Right: system info + time
# Update this path to point to your tmux-project/status/status.sh
set -g status-right-length 120
set -g status-right '#[default]#(~/.config/tmux-project/status.sh) | %m/%d %H:%M '

# Window numbering
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# ============================================================================
# GENERAL SETTINGS
# ============================================================================

set -g mouse on
set -g history-limit 10000

# Auto-rename windows to current dir
set -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_path}'

# Push session name to terminal title
set -g set-titles on
set -g set-titles-string '#S'

# ============================================================================
# TERMINAL — 256 color + true color
# ============================================================================

set -g default-terminal 'tmux-256color'
# Uncomment the line matching your terminal:
# set -ga terminal-overrides ',xterm-kitty:Tc'      # kitty
# set -ga terminal-overrides ',xterm-256color:Tc'    # most terminals
# set -ga terminal-overrides ',alacritty:Tc'         # alacritty

# ============================================================================
# PANE/MESSAGE STYLE — inherits terminal theme
# ============================================================================

set -g pane-border-style 'default'
set -g pane-active-border-style 'default,bold'
set -g message-style 'reverse,bold'

# ============================================================================
# KEY BINDINGS
# ============================================================================

# Quick reload config: prefix + r
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# ============================================================================
# macOS ONLY — uncomment if using macOS and need keychain/clipboard access
# ============================================================================
# set -g default-command "reattach-to-user-namespace -l ${SHELL}"
